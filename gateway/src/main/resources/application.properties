spring.application.name=gateway
server.port=8084


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Zipkin 
#1.0 means everything will be traced in production it may slow down system, so we can use 2.5 or anything suitable
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


#Gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# JOB SERVICE ROUTE
spring.cloud.gateway.routes[0].id=job-service
spring.cloud.gateway.routes[0].uri=lb://JOB-SERVICE
#we can use URL as well like http://localhost:8082
# with lb we cannot use port number and all , lb stands for load balance means we are using spring cloud discovery
# lb used because if we have 10 instances of service it will load balance evenly between running instances
spring.cloud.gateway.routes[0].predicates[0]=Path=/jobs/**

# COMPANY SERVICE ROUTE
spring.cloud.gateway.routes[1].id=company-service
spring.cloud.gateway.routes[1].uri=lb://COMPANY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/companies,,/companies/**

# REVIEW SERVICE ROUTE
spring.cloud.gateway.routes[2].id=review-service
spring.cloud.gateway.routes[2].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/reviews/**

# EUREKA
spring.cloud.gateway.routes[3].id=eureka-server
spring.cloud.gateway.routes[3].uri=http://localhost:8761
spring.cloud.gateway.routes[3].predicates[0]=Path=/eureka/**


# Enable service discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#Logging
logging.level.root=info
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping=DEBUG